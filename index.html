<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>九万亩风格战略对局 Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="top-bar">
        <div>👑 主城 <strong id="castle-pos"></strong></div>
        <div>🏳 领土 <strong id="my-territory">1</strong></div>
        <div>🪖 兵力 <strong id="my-soldiers">30</strong></div>
        <div>🚶 行军 <strong id="marching-count">0</strong></div>
        <div>🎯 目标 <strong id="goal">占领20块地获胜</strong></div>
        <div>📌 状态 <strong id="status">准备中</strong></div>
      </header>

      <main class="layout">
        <section class="panel">
          <div class="title-row">
            <h3>世界地图（600x600）</h3>
            <div id="view-pos">视野: (0,0)</div>
          </div>
          <canvas id="world" width="780" height="780"></canvas>
          <p class="hint">玩法：方向键移动视野，点击你领土边界外的荒地发起进攻；行军抵达后触发9x9战斗，胜利即可占领。</p>
          <div class="controls">
            <button id="start-game">开始对局</button>
            <button id="pause-game">暂停</button>
            <button id="resume-game">继续</button>
          </div>
        </section>

        <section class="panel side">
          <h3>9x9 战斗</h3>
          <canvas id="battle" width="360" height="360"></canvas>
          <div id="battle-log" class="log">点击“开始对局”开始游戏。</div>
          <div class="row-btns">
            <button id="next-turn" disabled>下一回合</button>
            <button id="auto-turn" disabled>自动10回合</button>
          </div>
          <ul>
            <li>蓝方=我军，红方=守军。</li>
            <li>单位自动寻敌、移动并攻击。</li>
            <li>每次进攻消耗5兵力，胜利可占地。</li>
          </ul>
        </section>
      </main>
    </div>

    <script src="game.js"></script>
  </body>
</html>
